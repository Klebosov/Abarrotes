<div class="pantalla-pos">
  <header class="header-azul">
    <div class="logo-area">
      <span class="icono">🏪</span>
      <div>
        <h1>Sistema POS</h1>
        <p>Tienda de Insumos Alimenticios</p>
      </div>
    </div>
    <button class="btn-config">⚙️</button>
  </header>

  <div class="cuerpo-pos">
    <main class="panel-productos">
      
      <a routerLink="/" class="btn-volver">
        ← Volver a Categorias
      </a>

      <div class="buscador-container">
        <input type="text" placeholder="🔍 Buscar en Carnes...">
      </div>

      <section class="contenedor-blanco listado-seccion">
        <div class="titulo-categoria">
          <span>🥩</span>
          <h2>Lacteos</h2>
        </div>

        <div class="grid-productos">
          
          <article class="tarjeta-producto">
            <div class="imagen-placeholder">
              <img src="https://media.glamour.mx/photos/6523ab64e97e63a3d8fef2dc/16:9/w_2560%2Cc_limit/yogur-para-blanquear-la-piel.jpg" alt="Pollo Fresco">
            </div>
            <div class="info-producto">
              <h3>Yogurt Natural</h3>
              <div class="precio-accion">
                <span class="precio">$ 12.50</span>
                <button class="btn-agregar">+ Agregar</button>
              </div>
            </div>
          </article>

          <article class="tarjeta-producto">
            <div class="imagen-placeholder">
              <img src="https://via.placeholder.com/150" alt="Carne de Res">
            </div>
            <div class="info-producto">
              <h3>Queso</h3>
              <div class="precio-accion">
                <span class="precio">$ 95.00</span>
                <button class="btn-agregar">+ Agregar</button>
              </div>
            </div>
          </article>

        </div>
      </section>
    </main>

    <aside class="panel-carrito">
      <div class="carrito-borde">
        <div class="carrito-header">
          <span>🛒</span>
          <h3>Carrito de Venta</h3>
        </div>
        <div class="carrito-vacio">
          <span class="icon-cart">🛒</span>
          <p>No hay productos en el carrito</p>
        </div>
      </div>
    </aside>
  </div>
</div>
